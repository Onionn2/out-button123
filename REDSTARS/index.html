<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>REDSTARS Official Goods</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f5f5f5;
color:#222;
text-align:center;
}

/* ===== オープニング ===== */

#loader{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
overflow:hidden;
z-index:1000;
}

/* 赤い光 */

#loader::before{
content:"";
position:absolute;
width:700px;
height:700px;
background:radial-gradient(circle, rgba(255,0,0,0.5), transparent 70%);
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(0.8);opacity:0.7;}
100%{transform:scale(1.4);opacity:0;}
}

/* ロゴ */

.logo{
width:260px;
z-index:2;
filter:drop-shadow(0 0 25px red);
animation:logoIntro 2.5s ease-out;
}

@keyframes logoIntro{

0%{
transform:scale(0.2) rotate(-20deg);
opacity:0;
}

60%{
transform:scale(1.2) rotate(5deg);
}

100%{
transform:scale(1) rotate(0);
opacity:1;
}

}

/* REDSTARS文字 */

.title{
margin-top:20px;
font-size:45px;
letter-spacing:8px;
color:red;
text-shadow:0 0 20px red;
animation:fadeIn 2s;
z-index:2;
}

@keyframes fadeIn{
0%{opacity:0;}
100%{opacity:1;}
}

/* 流れ星 */

.star{
position:absolute;
width:3px;
height:120px;
background:linear-gradient(red, transparent);
opacity:0.7;
animation:shoot 2s linear infinite;
}

.star:nth-child(1){left:10%; animation-delay:0s}
.star:nth-child(2){left:30%; animation-delay:0.5s}
.star:nth-child(3){left:50%; animation-delay:1s}
.star:nth-child(4){left:70%; animation-delay:1.5s}
.star:nth-child(5){left:90%; animation-delay:2s}

@keyframes shoot{

0%{
transform:translateY(-120vh) translateX(-50px);
opacity:1;
}

100%{
transform:translateY(120vh) translateX(50px);
opacity:0;
}

}

/* ===== メインサイト ===== */

#content{
display:none;
padding:40px;
}

header img{
width:120px;
}

.shop{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:30px;
margin-top:40px;
}

.item{
background:white;
border-radius:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.15);
padding:20px;
width:220px;
transition:transform 0.3s;
}

.item:hover{
transform:translateY(-6px);
}

.item img{
width:100%;
border-radius:8px;
}

button{
margin-top:10px;
background:#e53935;
color:white;
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

button:hover{
background:#c62828;
}

</style>
</head>

<body>

<!-- オープニング -->

<div id="loader">

<div class="star"></div>
<div class="star"></div>
<div class="star"></div>
<div class="star"></div>
<div class="star"></div>

<img src="logo.JPG" class="logo">
<div class="title">REDSTARS</div>

</div>

<!-- メイン -->

<div id="content">

<header>
<img src="logo.JPG">
<h1>REDSTARS OFFICIAL GOODS</h1>
</header>

<div class="shop">

<div class="item">
<img src="shirt.png">
<h2>Tシャツ</h2>
<p>¥6000</p>
<button>購入</button>
</div>

<div class="item">
<img src="towel.png">
<h2>タオル</h2>
<p>¥1500</p>
<button>購入</button>
</div>

<div class="item">
<img src="sticker.png">
<h2>ステッカー5枚入り</h2>
<p>¥1500</p>
<button>購入</button>
</div>

</div>

</div>

<script>

window.onload = function(){

setTimeout(function(){

document.getElementById("loader").style.display="none";
document.getElementById("content").style.display="block";

},4000);

}

</script>

</body>
</html>
